<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>小红书多模态语料库（图文+视频）</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: "Microsoft Yahei", sans-serif; background: #f5f5f5; }
        .container { max-width: 1200px; margin: 30px auto; padding: 0 20px; }
        h1 { text-align: center; color: #0066ff; margin-bottom: 30px; }
        .post-slider {
            display: flex;
            gap: 20px;
            overflow-x: auto;
            padding: 20px 0;
            scroll-snap-type: x mandatory;
        }
        .post-card {
            scroll-snap-align: start;
            min-width: 320px;
            background: #fff;
            border-radius: 12px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.1);
            overflow: hidden;
            flex-shrink: 0;
        }
        .post-media {
            width: 100%;
            height: 280px;
            object-fit: cover;
            background: #f0f0f0;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #999;
        }
        .post-content {
            padding: 15px;
        }
        .post-title {
            font-size: 16px;
            font-weight: bold;
            margin-bottom: 10px;
            color: #333;
        }
        .post-desc {
            font-size: 14px;
            color: #666;
            line-height: 1.5;
            margin-bottom: 10px;
        }
        .post-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 5px;
        }
        .tag {
            background: #f0f0f0;
            color: #666;
            padding: 3px 8px;
            border-radius: 4px;
            font-size: 12px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>小红书多模态语料库（图文+视频）</h1>
        <div class="post-slider" id="postSlider"></div>
    </div>

    <script>
        // 完全匹配你本地的JSON文件名，绝对正确
        const jsonFiles = [
            'search_contents_2025-12-22.json',
            'search_contents_2025-12-23.json',
            'search_contents_2025-12-24.json',
            'search_contents_2026-01-01.json',
            'search_contents_2026-01-05.json'
        ];

        let allPosts = [];

        // 加载所有JSON数据，带错误捕获
        Promise.all(
            jsonFiles.map(file => 
                fetch(file)
                    .then(res => {
                        if (!res.ok) throw new Error(`加载失败: ${file}`);
                        return res.json();
                    })
                    .catch(err => {
                        console.error(err);
                        return [];
                    })
            )
        ).then(results => {
            allPosts = results.flat();
            if (allPosts.length === 0) {
                document.getElementById('postSlider').innerHTML = '<p style="text-align:center; color:#999; width:100%;">未加载到语料数据，请检查JSON文件</p>';
                return;
            }
            renderPosts(allPosts);
        }).catch(err => {
            document.getElementById('postSlider').innerHTML = `<p style="text-align:center; color:#999; width:100%;">数据加载异常: ${err.message}</p>`;
            console.error(err);
        });

        // 渲染横向滑动的帖子卡片
        function renderPosts(posts) {
            const slider = document.getElementById('postSlider');
            slider.innerHTML = '';

            posts.forEach(post => {
                const card = document.createElement('div');
                card.className = 'post-card';

                // 媒体渲染（图片/视频/纯文字）
                let mediaHtml = '<div class="post-media">纯文字内容</div>';
                if (post.images && post.images.length > 0) {
                    mediaHtml = `<img class="post-media" src="posts/${post.note_id}/${post.images[0]}" alt="${post.title || '帖子图片'}">`;
                } else if (post.video) {
                    mediaHtml = `<video class="post-media" controls src="posts/${post.note_id}/${post.video}"></video>`;
                }

                // 标签提取
                const tags = post.desc ? post.desc.match(/#[^#\s]+/g) || [] : [];
                const tagsHtml = tags.map(tag => `<span class="tag">${tag}</span>`).join('');

                // 拼接完整卡片
                card.innerHTML = `
                    ${mediaHtml}
                    <div class="post-content">
                        <h3 class="post-title">${post.title || '无标题'}</h3>
                        <p class="post-desc">${post.desc || '无描述'}</p>
                        <div class="post-tags">${tagsHtml}</div>
                    </div>
                `;

                slider.appendChild(card);
            });
        }
    </script>
</body>
</html>
